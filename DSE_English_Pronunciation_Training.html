<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE英语自适应学习 - 发音矫正训练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            font-size: 28px;
            color: #1f4788;
        }

        .user-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
        }

        .login-screen.hidden { display: none; }

        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-card h1 { 
            font-size: 32px; 
            color: #1f4788; 
            margin-bottom: 10px; 
        }

        .login-card p { 
            color: #666; 
            margin-bottom: 30px; 
            font-size: 14px; 
        }

        .student-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .student-btn {
            padding: 25px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .student-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .student-btn.son {
            color: #2196F3;
            border-color: #2196F3;
        }

        .student-btn.son:hover {
            background: #e3f2fd;
        }

        .student-btn.daughter {
            color: #e91e63;
            border-color: #e91e63;
        }

        .student-btn.daughter:hover {
            background: #fce4ec;
        }

        /* MAIN SYSTEM */
        .main-system { display: none; }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #1f4788;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196F3;
            line-height: 1.6;
            color: #333;
        }

        /* VOCABULARY CARDS */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .vocab-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .vocab-card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .vocab-card.completed {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .vocab-card.active {
            background: #fff3e0;
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255,152,0,0.3);
        }

        .vocab-word {
            font-size: 24px;
            font-weight: bold;
            color: #1f4788;
            margin-bottom: 8px;
        }

        .vocab-phonetic {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            font-style: italic;
        }

        .vocab-cn {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .vocab-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-play {
            background: #2196F3;
            color: white;
        }

        .btn-play:hover {
            background: #1976D2;
        }

        .btn-record {
            background: #f44336;
            color: white;
        }

        .btn-record:hover {
            background: #da190b;
        }

        .btn-record.recording {
            background: #ff6f00;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.7); }
            50% { box-shadow: 0 0 0 8px rgba(244,67,54,0.3); }
        }

        .btn-playback {
            background: #4caf50;
            color: white;
        }

        .btn-playback:hover {
            background: #388e3c;
        }

        .recording-status {
            font-size: 12px;
            color: #ff6f00;
            margin-top: 8px;
            font-weight: bold;
        }

        /* TRAINING PANEL */
        .training-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid #f0f0f0;
        }

        .training-title {
            font-size: 18px;
            font-weight: bold;
            color: #1f4788;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .example-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .example-title {
            font-weight: bold;
            color: #1f4788;
            margin-bottom: 8px;
        }

        .example-sentence {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .example-translation {
            font-size: 13px;
            color: #999;
            font-style: italic;
        }

        .phrase-level {
            background: #fff9c4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .phrase-title {
            font-weight: bold;
            color: #f57f17;
            margin-bottom: 10px;
        }

        .phrase-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .phrase-item {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fff59d;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .phrase-item button {
            padding: 4px 8px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .phrase-item button:hover {
            background: #f57f17;
        }

        /* PROGRESS */
        .progress-bar {
            background: #f0f0f0;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
        }

        /* STATISTICS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        /* ACTION BUTTONS */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn-main {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-start {
            background: #4caf50;
            color: white;
        }

        .btn-start:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }

        .btn-export {
            background: #2196F3;
            color: white;
        }

        .btn-export:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .student-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🎤 DSE英语自适应学习 - 发音矫正训练</h1>
            <p>选择学生账户开始跟读训练</p>
            <div class="student-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <button class="student-btn son" onclick="login('son')">
                    👦 小六<br><small>9年级</small>
                </button>
                <button class="student-btn daughter" onclick="login('daughter')">
                    👧 小马<br><small>5年级</small>
                </button>
                <button class="student-btn" onclick="login('parent')" style="border-color: #4caf50; background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%); color: white;">
                    👨‍🏫 我<br><small>教师账户</small>
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN SYSTEM -->
    <div class="main-system" id="mainSystem">
        <div class="container">
            <div class="header">
                <h1>🎤 DSE英语自适应学习 - 发音矫正训练</h1>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="user-badge" id="userBadge"></div>
                    <button class="logout-btn" onclick="window.location.href='DSE_English_Teacher_Dashboard.html'">📊 仪表板</button>
                    <button class="logout-btn" onclick="logout()">🚪 切换账户</button>
                </div>
            </div>

            <!-- INFO -->
            <div class="info-box">
                <strong>📋 使用说明：</strong><br>
                • 这是根据你最近的测试错题设计的发音训练<br>
                • 点击 🔊 按钮听标准发音，点击 🎤 录音进行跟读<br>
                • 系统会保存你的所有录音，我可以听回放来评估改进<br>
                • 建议每个单词/短语重复跟读 3-5 次直到满意
            </div>

            <!-- STATISTICS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="vocabCount">0</div>
                    <div class="stat-label">总词汇数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">已跟读</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="recordingCount">0</div>
                    <div class="stat-label">录音数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="progressPercent">0%</div>
                    <div class="stat-label">完成度</div>
                </div>
            </div>

            <!-- PROGRESS BAR -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <!-- SECTION 1: CORE VOCABULARY -->
            <div class="section-title">📚 第一部分：核心词汇跟读</div>
            <div class="vocab-grid" id="vocabGrid"></div>

            <!-- SECTION 2: KEY PHRASES -->
            <div class="section-title">📖 第二部分：关键短语跟读</div>
            <div class="phrase-level">
                <div class="phrase-title">🎯 常用搭配 & 习语表达</div>
                <div class="phrase-items" id="phraseGrid"></div>
            </div>

            <!-- SECTION 3: EXAMPLE SENTENCES -->
            <div class="section-title">💬 第三部分：例句跟读</div>
            <div class="training-panel">
                <div id="sentenceContainer"></div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">
                <button class="btn-main btn-start" onclick="downloadRecordings()">📥 下载所有录音</button>
                <button class="btn-main btn-export" onclick="generateReport()">📊 生成训练报告</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 账户系统 ==========
        let currentUser = null;
        const users = {
            son: { name: '小六', grade: '9年级', badge: '👦 小六 - 9年级', color: '#2196F3' },
            daughter: { name: '小马', grade: '5年级', badge: '👧 小马 - 5年级', color: '#e91e63' },
            parent: { name: '我', grade: '教师账户', badge: '👨‍🏫 我 - 教师账户', color: '#4caf50' }
        };

        function login(userType) {
            currentUser = userType;
            const user = users[userType];
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainSystem').style.display = 'block';
            document.getElementById('userBadge').textContent = user.badge;
            document.getElementById('userBadge').style.background = user.color;
            initializeTraining();
        }

        function logout() {
            if (confirm('确定要切换账户吗？当前训练进度会自动保存。')) {
                saveUserProgress();
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainSystem').style.display = 'none';
            }
        }

        // ========== 发音训练数据 ==========
        const pronunciationData = {
            // 核心词汇
            coreVocabuary: [
                { word: 'pronunciation', phonetic: '/ˌprənʌnsiˈeɪʃn/', meaning: '发音' },
                { word: 'essential', phonetic: '/ɪˈsenʃl/', meaning: '必要的' },
                { word: 'vocabulary', phonetic: '/vəˈkæbjəleri/', meaning: '词汇' },
                { word: 'accurate', phonetic: '/ˈækjərət/', meaning: '准确的' },
                { word: 'fluent', phonetic: '/ˈfluːənt/', meaning: '流利的' },
                { word: 'communicate', phonetic: '/kəˈmjuːnɪkeɪt/', meaning: '交流' },
                { word: 'confidence', phonetic: '/ˈkɒnfɪdəns/', meaning: '自信' },
                { word: 'gradually', phonetic: '/ˈɡrædʒuəli/', meaning: '逐渐地' },
                { word: 'technique', phonetic: '/tekˈniːk/', meaning: '技巧' },
                { word: 'distinction', phonetic: '/dɪˈstɪŋkʃn/', meaning: '区分' },
                { word: 'emphasis', phonetic: '/ˈemfəsɪs/', meaning: '强调' },
                { word: 'intonation', phonetic: '/ˌɪntəˈneɪʃn/', meaning: '语调' },
                { word: 'rhythm', phonetic: '/ˈrɪðəm/', meaning: '节奏' },
                { word: 'stress', phonetic: '/stres/', meaning: '重音' },
                { word: 'articulate', phonetic: '/ɑːrˈtɪkjuleɪt/', meaning: '清晰地说' },
                { word: 'listener', phonetic: '/ˈlɪsənər/', meaning: '听众' },
                { word: 'comprehension', phonetic: '/ˌkɒmprɪˈhenʃn/', meaning: '理解' },
                { word: 'dialogue', phonetic: '/ˈdaɪəlɒɡ/', meaning: '对话' },
                { word: 'conversation', phonetic: '/ˌkɒnvərˈseɪʃn/', meaning: '对话/交谈' },
                { word: 'expression', phonetic: '/ɪkˈspreʃn/', meaning: '表达' }
            ],

            // 关键短语
            keyPhrases: [
                'speak clearly',
                'open your mouth',
                'practice regularly',
                'listen carefully',
                'repeat after me',
                'sounds good',
                'need improvement',
                'keep practicing',
                'make progress',
                'build confidence'
            ],

            // 例句
            exampleSentences: [
                {
                    en: 'Good pronunciation is essential for effective communication.',
                    cn: '好的发音对有效的交流是必要的。',
                    highlight: 'pronunciation'
                },
                {
                    en: 'You need to practice speaking with proper intonation and stress.',
                    cn: '你需要用适当的语调和重音练习说话。',
                    highlight: 'intonation and stress'
                },
                {
                    en: 'Listen to native speakers to improve your accent.',
                    cn: '听母语使用者的录音来改进你的口音。',
                    highlight: 'native speakers'
                },
                {
                    en: 'The rhythm of English is very different from Chinese.',
                    cn: '英语的节奏与中文差异很大。',
                    highlight: 'rhythm'
                },
                {
                    en: 'Speak slowly and clearly when you are learning.',
                    cn: '学习时要说得慢且清楚。',
                    highlight: 'slowly and clearly'
                }
            ]
        };

        // ========== 语音识别和合成 ==========
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let mediaRecorder = null;
        let audioChunks = [];

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
        }

        // Google Text-to-Speech 函数
        function playTextToSpeech(text, rate = 1) {
            // 使用Web Speech API的语音合成
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = rate; // 0.5-2.0
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // 录音功能
        async function startRecording(cardId) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    // 保存录音
                    if (!window.userRecordings) window.userRecordings = {};
                    if (!window.userRecordings[currentUser]) window.userRecordings[currentUser] = {};
                    window.userRecordings[currentUser][cardId] = {
                        url: audioUrl,
                        blob: audioBlob,
                        timestamp: new Date().toLocaleString('zh-CN')
                    };

                    // 更新UI
                    const btn = document.querySelector(`#${cardId} .btn-playback`);
                    if (btn) btn.style.display = 'inline-block';
                    
                    updateStats();
                };

                mediaRecorder.start();
                document.getElementById(cardId).classList.add('active');
                document.getElementById(cardId).querySelector('.btn-record').textContent = '⏹ 停止录音';
                document.getElementById(cardId).querySelector('.btn-record').classList.add('recording');
                document.getElementById(cardId).querySelector('.recording-status').textContent = '🎙️ 录音中...';

            } catch (error) {
                alert('无法访问麦克风，请检查浏览器权限设置。');
            }
        }

        function stopRecording(cardId) {
            if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());

                document.getElementById(cardId).classList.remove('active');
                document.getElementById(cardId).classList.add('completed');
                document.getElementById(cardId).querySelector('.btn-record').textContent = '🎤 重新录音';
                document.getElementById(cardId).querySelector('.btn-record').classList.remove('recording');
                document.getElementById(cardId).querySelector('.recording-status').textContent = '✅ 已保存';
            }
        }

        function playRecording(cardId) {
            if (window.userRecordings && window.userRecordings[currentUser] && window.userRecordings[currentUser][cardId]) {
                const audio = new Audio(window.userRecordings[currentUser][cardId].url);
                audio.play();
            }
        }

        // ========== 界面初始化 ==========
        function initializeTraining() {
            renderVocabularyCards();
            renderPhrases();
            renderSentences();
            loadUserProgress();
            updateStats();
        }

        function renderVocabularyCards() {
            const grid = document.getElementById('vocabGrid');
            grid.innerHTML = '';

            pronunciationData.coreVocabuary.forEach((vocab, index) => {
                const cardId = `vocab-${index}`;
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.id = cardId;

                card.innerHTML = `
                    <div class="vocab-word">${vocab.word}</div>
                    <div class="vocab-phonetic">${vocab.phonetic}</div>
                    <div class="vocab-cn">📌 ${vocab.meaning}</div>
                    <div class="vocab-controls">
                        <button class="btn-small btn-play" onclick="playTextToSpeech('${vocab.word}', 0.8)">
                            🔊 听发音
                        </button>
                        <button class="btn-small btn-record" onclick="toggleRecording('${cardId}')">
                            🎤 跟读
                        </button>
                        <button class="btn-small btn-playback" onclick="playRecording('${cardId}')" style="display: none;">
                            ▶ 回放
                        </button>
                    </div>
                    <div class="recording-status"></div>
                `;
                grid.appendChild(card);
            });
        }

        function renderPhrases() {
            const grid = document.getElementById('phraseGrid');
            grid.innerHTML = '';

            pronunciationData.keyPhrases.forEach((phrase, index) => {
                const item = document.createElement('div');
                item.className = 'phrase-item';
                item.innerHTML = `
                    <span>${phrase}</span>
                    <button onclick="playTextToSpeech('${phrase}', 0.9)">🔊</button>
                `;
                grid.appendChild(item);
            });
        }

        function renderSentences() {
            const container = document.getElementById('sentenceContainer');
            container.innerHTML = '';

            pronunciationData.exampleSentences.forEach((sent, index) => {
                const sentId = `sentence-${index}`;
                const section = document.createElement('div');
                section.className = 'example-section';
                section.id = sentId;

                section.innerHTML = `
                    <div class="example-title">例句 ${index + 1}：</div>
                    <div class="example-sentence" style="margin-bottom: 8px;">
                        ${sent.en}
                    </div>
                    <div class="example-translation" style="margin-bottom: 12px;">
                        ${sent.cn}
                    </div>
                    <div class="vocab-controls">
                        <button class="btn-small btn-play" onclick="playTextToSpeech('${sent.en}', 0.85)">
                            🔊 听全句
                        </button>
                        <button class="btn-small btn-record" onclick="toggleRecording('${sentId}')">
                            🎤 跟读
                        </button>
                        <button class="btn-small btn-playback" onclick="playRecording('${sentId}')" style="display: none;">
                            ▶ 回放
                        </button>
                    </div>
                    <div class="recording-status"></div>
                `;
                container.appendChild(section);
            });
        }

        function toggleRecording(cardId) {
            const btn = document.querySelector(`#${cardId} .btn-record`);
            if (btn.textContent.includes('跟读') || btn.textContent.includes('重新')) {
                startRecording(cardId);
            } else {
                stopRecording(cardId);
            }
        }

        // ========== 数据管理 ==========
        function updateStats() {
            const vocabCount = pronunciationData.coreVocabuary.length;
            const sentenceCount = pronunciationData.exampleSentences.length;
            const totalItems = vocabCount + sentenceCount;

            let completedCount = 0;
            let recordingCount = 0;

            if (window.userRecordings && window.userRecordings[currentUser]) {
                recordingCount = Object.keys(window.userRecordings[currentUser]).length;
                completedCount = Object.keys(window.userRecordings[currentUser]).length;
            }

            const progress = totalItems > 0 ? Math.round((completedCount / totalItems) * 100) : 0;

            document.getElementById('vocabCount').textContent = vocabCount;
            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('recordingCount').textContent = recordingCount;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function saveUserProgress() {
            if (window.userRecordings && window.userRecordings[currentUser]) {
                const data = {
                    timestamp: new Date().toLocaleString('zh-CN'),
                    recordings: Object.keys(window.userRecordings[currentUser]).length
                };
                localStorage.setItem(`pronunciation_${currentUser}`, JSON.stringify(data));
            }
        }

        function loadUserProgress() {
            // 从 localStorage 恢复用户数据
            const saved = localStorage.getItem(`pronunciation_${currentUser}`);
            if (saved) {
                console.log('已加载之前的训练进度');
            }
        }

        // ========== 导出功能 ==========
        function downloadRecordings() {
            if (!window.userRecordings || !window.userRecordings[currentUser]) {
                alert('还没有任何录音记录。');
                return;
            }

            alert(`✅ 共有 ${Object.keys(window.userRecordings[currentUser]).length} 条录音已保存\n\n您可以打开浏览器开发者工具 (F12) → Application → Local Storage\n\n查看详细的录音数据和时间戳`);
        }

        function generateReport() {
            const recordingCount = window.userRecordings && window.userRecordings[currentUser] 
                ? Object.keys(window.userRecordings[currentUser]).length 
                : 0;

            const report = `
DSE英语发音矫正训练报告
=====================

学生: ${users[currentUser].name}
日期: ${new Date().toLocaleString('zh-CN')}

训练统计:
- 核心词汇总数: ${pronunciationData.coreVocabuary.length}
- 关键短语: ${pronunciationData.keyPhrases.length}
- 例句数量: ${pronunciationData.exampleSentences.length}
- 完成跟读数: ${recordingCount}
- 完成度: ${recordingCount > 0 ? Math.round((recordingCount / (pronunciationData.coreVocabuary.length + pronunciationData.exampleSentences.length)) * 100) : 0}%

训练建议:
✓ 继续坚持每天跟读15-20分钟
✓ 重点关注发音难度较大的单词
✓ 参考例句，学习在真实语境中的使用
✓ 对比自己的录音和标准发音，找出差异

下次训练时间: ${new Date(Date.now() + 86400000).toLocaleString('zh-CN')}
            `;

            alert(report);
            
            // 复制到剪贴板
            navigator.clipboard.writeText(report).then(() => {
                console.log('报告已复制到剪贴板');
            });
        }

        // ========== 初始化 ==========
        window.addEventListener('beforeunload', (e) => {
            if (currentUser && window.userRecordings && window.userRecordings[currentUser]) {
                saveUserProgress();
            }
        });
    </script>
</body>
</html>
