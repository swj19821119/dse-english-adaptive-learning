<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE英语自适应学习 - 错题复习系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            font-size: 28px;
            color: #1f4788;
        }

        .user-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
        }

        .login-screen.hidden { display: none; }

        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-card h1 { 
            font-size: 32px; 
            color: #1f4788; 
            margin-bottom: 10px; 
        }

        .student-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .student-btn {
            padding: 25px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .student-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .student-btn.son {
            color: #2196F3;
            border-color: #2196F3;
        }

        .student-btn.daughter {
            color: #e91e63;
            border-color: #e91e63;
        }

        /* MAIN SYSTEM */
        .main-system { display: none; }

        /* STATISTICS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        /* TAB SYSTEM */
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.show {
            display: block;
        }

        /* WRONG QUESTIONS LIST */
        .question-card {
            background: #fff3e0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9800;
        }

        .question-card.today {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .question-card.due {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .question-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .question-type.grammar { background: #2196F3; }
        .question-type.vocabulary { background: #4caf50; }
        .question-type.reading { background: #ff9800; }
        .question-type.writing { background: #9c27b0; }

        .question-text {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .question-options {
            margin-bottom: 15px;
        }

        .option {
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }

        .option.selected {
            border-color: #667eea;
            background: #e3f2fd;
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .question-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            font-size: 13px;
            color: #666;
        }

        .meta-item {
            background: white;
            padding: 8px;
            border-radius: 6px;
        }

        .meta-label {
            font-weight: bold;
            margin-bottom: 3px;
        }

        /* ACTION BUTTONS */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        /* REVIEW SCHEDULE */
        .review-schedule {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .schedule-title {
            font-size: 18px;
            font-weight: bold;
            color: #1f4788;
            margin-bottom: 15px;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .schedule-day {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .day-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .day-label {
            font-size: 14px;
            color: #666;
        }

        .day-count {
            font-size: 13px;
            color: #ff9800;
            margin-top: 5px;
        }

        /* PROGRESS BAR */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #f0f0f0;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-state-hint {
            font-size: 14px;
            color: #666;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .tab-buttons { flex-wrap: wrap; }
            .question-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>📚 DSE英语自适应学习 - 错题复习系统</h1>
            <p>基于艾宾浩斯记忆曲线的智能复习</p>
            <div class="student-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <button class="student-btn son" onclick="login('son')">
                    👦 小六<br><small>9年级</small>
                </button>
                <button class="student-btn daughter" onclick="login('daughter')">
                    👧 小马<br><small>5年级</small>
                </button>
                <button class="student-btn" onclick="login('parent')" style="border-color: #4caf50; background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%); color: white;">
                    👨‍🏫 我<br><small>教师账户</small>
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN SYSTEM -->
    <div class="main-system" id="mainSystem">
        <div class="container">
            <div class="header">
                <h1>📚 DSE英语自适应学习 - 错题复习系统</h1>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="user-badge" id="userBadge"></div>
                    <button class="btn btn-primary" onclick="window.location.href='DSE_English_Teacher_Dashboard.html'">📊 仪表板</button>
                    <button class="btn btn-danger" onclick="logout()">🚪 切换账户</button>
                </div>
            </div>

            <!-- STATISTICS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalWrong">0</div>
                    <div class="stat-label">错题总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="todayReview">0</div>
                    <div class="stat-label">今日待复习</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="reviewedCount">0</div>
                    <div class="stat-label">已复习</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="masteredCount">0</div>
                    <div class="stat-label">已掌握</div>
                </div>
            </div>

            <!-- REVIEW SCHEDULE -->
            <div class="review-schedule">
                <div class="schedule-title">📅 艾宾浩斯复习计划</div>
                <div class="schedule-grid">
                    <div class="schedule-day">
                        <div class="day-number">1</div>
                        <div class="day-label">今天</div>
                        <div class="day-count" id="day1Count">0 题</div>
                    </div>
                    <div class="schedule-day">
                        <div class="day-number">3</div>
                        <div class="day-label">3天后</div>
                        <div class="day-count" id="day3Count">0 题</div>
                    </div>
                    <div class="schedule-day">
                        <div class="day-number">7</div>
                        <div class="day-label">7天后</div>
                        <div class="day-count" id="day7Count">0 题</div>
                    </div>
                    <div class="schedule-day">
                        <div class="day-number">14</div>
                        <div class="day-label">14天后</div>
                        <div class="day-count" id="day14Count">0 题</div>
                    </div>
                </div>
            </div>

            <!-- PROGRESS -->
            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="reviewProgress" style="width: 0%"></div>
                </div>
                <div class="progress-text">
                    今日复习进度：<span id="progressText">0%</span>
                </div>
            </div>

            <!-- TABS -->
            <div class="tab-buttons">
                <button type="button" class="tab-btn active" onclick="switchTab('today')">
                    🔥 今日待复习
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('all')">
                    📋 所有错题
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('mastered')">
                    ✅ 已掌握
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('add')">
                    ➕ 添加错题
                </button>
            </div>

            <!-- TAB CONTENT: TODAY -->
            <div class="tab-content show" id="today-tab">
                <div id="todayQuestions"></div>
            </div>

            <!-- TAB CONTENT: ALL -->
            <div class="tab-content" id="all-tab">
                <div id="allQuestions"></div>
            </div>

            <!-- TAB CONTENT: MASTERED -->
            <div class="tab-content" id="mastered-tab">
                <div id="masteredQuestions"></div>
            </div>

            <!-- TAB CONTENT: ADD -->
            <div class="tab-content" id="add-tab">
                <div class="question-card">
                    <h3 style="margin-bottom: 20px; color: #1f4788;">➕ 添加错题</h3>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; margin-bottom: 5px; display: block;">题型</label>
                        <select id="questionType" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; width: 100%;">
                            <option value="grammar">📝 语法</option>
                            <option value="vocabulary">📖 词汇</option>
                            <option value="reading">📚 阅读</option>
                            <option value="writing">✍️ 写作</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; margin-bottom: 5px; display: block;">题目</label>
                        <textarea id="questionText" rows="3" style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 100%; font-size: 14px;" placeholder="输入题目内容..."></textarea>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; margin-bottom: 5px; display: block;">选项（每行一个）</label>
                        <textarea id="questionOptions" rows="4" style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 100%; font-size: 14px;" placeholder="A. 选项1&#10;B. 选项2&#10;C. 选项3&#10;D. 选项4"></textarea>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; margin-bottom: 5px; display: block;">正确答案</label>
                        <select id="correctAnswer" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; width: 100%;">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; margin-bottom: 5px; display: block;">解析（可选）</label>
                        <textarea id="questionExplanation" rows="2" style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 100%; font-size: 14px;" placeholder="输入解析说明..."></textarea>
                    </div>

                    <button class="btn btn-primary" onclick="addWrongQuestion()">
                        ✅ 添加错题
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 账户系统 ==========
        let currentUser = null;
        const users = {
            son: { name: '小六', grade: '9年级', badge: '👦 小六 - 9年级' },
            daughter: { name: '小马', grade: '5年级', badge: '👧 小马 - 5年级' },
            parent: { name: '我', grade: '教师账户', badge: '👨‍🏫 我 - 教师账户' }
        };

        function login(userType) {
            currentUser = userType;
            const user = users[userType];
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainSystem').style.display = 'block';
            document.getElementById('userBadge').textContent = user.badge;
            loadWrongQuestions();
            updateStats();
        }

        function logout() {
            if (confirm('确定要切换账户吗？')) {
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainSystem').style.display = 'none';
            }
        }

        // ========== 错题数据管理 ==========
        let wrongQuestions = [];

        // 示例错题数据
        const sampleQuestions = [
            {
                id: 1,
                type: 'grammar',
                text: 'If I had known about the accident, I _____ my friend immediately.',
                options: ['A. would notify', 'B. would have notified', 'C. will notify', 'D. have notified'],
                correct: 'B',
                explanation: '虚拟语气第三种类型：过去虚拟。从句用 had known，主句用 would have done',
                wrongDate: '2025-03-19',
                reviewDates: ['2025-03-19', '2025-03-22', '2025-03-26', '2025-04-02'],
                currentReviewIndex: 0,
                mastered: false
            },
            {
                id: 2,
                type: 'vocabulary',
                text: 'The _____ of the new policy was widely discussed.',
                options: ['A. implement', 'B. implementation', 'C. implementing', 'D. implemented'],
                correct: 'B',
                explanation: 'implement 是动词，implementation 是名词，作主语',
                wrongDate: '2025-03-19',
                reviewDates: ['2025-03-19', '2025-03-22', '2025-03-26', '2025-04-02'],
                currentReviewIndex: 0,
                mastered: false
            },
            {
                id: 3,
                type: 'reading',
                text: 'According to the passage, what is the main idea?',
                options: ['A. Technology improves life', 'B. Climate change is serious', 'C. Education is important', 'D. Health matters most'],
                correct: 'A',
                explanation: '文章主要讨论科技如何改善生活',
                wrongDate: '2025-03-18',
                reviewDates: ['2025-03-18', '2025-03-21', '2025-03-25', '2025-04-01'],
                currentReviewIndex: 1,
                mastered: false
            }
        ];

        function loadWrongQuestions() {
            const stored = localStorage.getItem(`wrongQuestions_${currentUser}`);
            if (stored) {
                wrongQuestions = JSON.parse(stored);
            } else {
                // 首次使用，加载示例数据
                wrongQuestions = JSON.parse(JSON.stringify(sampleQuestions));
                saveWrongQuestions();
            }
            renderTodayQuestions();
            renderAllQuestions();
            renderMasteredQuestions();
        }

        function saveWrongQuestions() {
            localStorage.setItem(`wrongQuestions_${currentUser}`, JSON.stringify(wrongQuestions));
        }

        // ========== 渲染函数 ==========
        function renderTodayQuestions() {
            const container = document.getElementById('todayQuestions');
            const today = new Date().toISOString().split('T')[0];
            
            const todayQuestions = wrongQuestions.filter(q => {
                return q.reviewDates && q.reviewDates[q.currentReviewIndex] === today && !q.mastered;
            });

            if (todayQuestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎉</div>
                        <div class="empty-state-text">太棒了！今天没有需要复习的错题</div>
                        <div class="empty-state-hint">继续保持，学习效率很高！</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = todayQuestions.map(q => createQuestionCard(q, 'today')).join('');
        }

        function renderAllQuestions() {
            const container = document.getElementById('allQuestions');
            const allQuestions = wrongQuestions.filter(q => !q.mastered);

            if (allQuestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <div class="empty-state-text">还没有错题记录</div>
                        <div class="empty-state-hint">完成测试后，系统会自动记录错题</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = allQuestions.map(q => createQuestionCard(q, 'all')).join('');
        }

        function renderMasteredQuestions() {
            const container = document.getElementById('masteredQuestions');
            const masteredQuestions = wrongQuestions.filter(q => q.mastered);

            if (masteredQuestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <div class="empty-state-text">还没有掌握的错题</div>
                        <div class="empty-state-hint">继续复习，早日掌握所有错题！</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = masteredQuestions.map(q => createQuestionCard(q, 'mastered')).join('');
        }

        function createQuestionCard(question, context) {
            const typeLabels = {
                grammar: '📝 语法',
                vocabulary: '📖 词汇',
                reading: '📚 阅读',
                writing: '✍️ 写作'
            };

            const nextReview = question.reviewDates[question.currentReviewIndex];
            const isDue = nextReview === new Date().toISOString().split('T')[0];

            return `
                <div class="question-card ${context === 'today' ? 'today' : ''} ${isDue ? 'due' : ''}">
                    <div class="question-header">
                        <span class="question-type ${question.type}">${typeLabels[question.type]}</span>
                        <div style="font-size: 12px; color: #666;">
                            ${question.wrongDate} 错题
                        </div>
                    </div>
                    
                    <div class="question-text">${question.text}</div>
                    
                    <div class="question-options">
                        ${question.options.map((opt, i) => `
                            <div class="option ${opt === question.correct ? 'correct' : ''}" onclick="selectAnswer(${question.id}, '${opt}')">
                                ${opt}
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="question-meta">
                        <div class="meta-item">
                            <div class="meta-label">正确答案</div>
                            <div style="color: #4caf50; font-weight: bold;">${question.correct}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">下次复习</div>
                            <div>${nextReview}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">复习次数</div>
                            <div>${question.currentReviewIndex + 1}/4</div>
                        </div>
                    </div>
                    
                    ${question.explanation ? `
                        <div style="margin-top: 15px; padding: 10px; background: white; border-radius: 6px; font-size: 13px; color: #666;">
                            <strong>💡 解析：</strong>${question.explanation}
                        </div>
                    ` : ''}
                    
                    <div class="action-buttons">
                        ${!question.mastered ? `
                            <button class="btn btn-success" onclick="markAsMastered(${question.id})">
                                ✅ 掌握了
                            </button>
                            <button class="btn btn-primary" onclick="nextReview(${question.id})">
                                📅 下次再复习
                            </button>
                        ` : `
                            <button class="btn" onclick="resetQuestion(${question.id})">
                                🔄 重新学习
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        // ========== 操作函数 ==========
        function selectAnswer(questionId, answer) {
            // 可以添加选择答案的逻辑
            console.log('Selected answer:', answer, 'for question:', questionId);
        }

        function markAsMastered(questionId) {
            const question = wrongQuestions.find(q => q.id === questionId);
            if (question) {
                question.mastered = true;
                question.masteredDate = new Date().toISOString().split('T')[0];
                saveWrongQuestions();
                renderTodayQuestions();
                renderAllQuestions();
                renderMasteredQuestions();
                updateStats();
            }
        }

        function nextReview(questionId) {
            const question = wrongQuestions.find(q => q.id === questionId);
            if (question) {
                // 移动到下一个复习时间
                question.currentReviewIndex++;
                if (question.currentReviewIndex >= question.reviewDates.length) {
                    question.currentReviewIndex = 0; // 重新开始循环
                }
                saveWrongQuestions();
                renderTodayQuestions();
                renderAllQuestions();
                updateStats();
            }
        }

        function resetQuestion(questionId) {
            const question = wrongQuestions.find(q => q.id === questionId);
            if (question) {
                question.mastered = false;
                question.currentReviewIndex = 0;
                saveWrongQuestions();
                renderTodayQuestions();
                renderAllQuestions();
                renderMasteredQuestions();
                updateStats();
            }
        }

        function addWrongQuestion() {
            const type = document.getElementById('questionType').value;
            const text = document.getElementById('questionText').value.trim();
            const optionsText = document.getElementById('questionOptions').value.trim();
            const correct = document.getElementById('correctAnswer').value;
            const explanation = document.getElementById('questionExplanation').value.trim();

            if (!text || !optionsText) {
                alert('请输入题目和选项！');
                return;
            }

            const options = optionsText.split('\n').filter(opt => opt.trim());

            const today = new Date();
            const reviewDates = [
                today.toISOString().split('T')[0],
                new Date(today.setDate(today.getDate() + 3)).toISOString().split('T')[0],
                new Date(today.setDate(today.getDate() + 4)).toISOString().split('T')[0],
                new Date(today.setDate(today.getDate() + 7)).toISOString().split('T')[0]
            ];

            const newQuestion = {
                id: Date.now(),
                type: type,
                text: text,
                options: options,
                correct: correct,
                explanation: explanation,
                wrongDate: new Date().toISOString().split('T')[0],
                reviewDates: reviewDates,
                currentReviewIndex: 0,
                mastered: false
            };

            wrongQuestions.unshift(newQuestion);
            saveWrongQuestions();

            // 清空表单
            document.getElementById('questionText').value = '';
            document.getElementById('questionOptions').value = '';
            document.getElementById('questionExplanation').value = '';

            alert('错题添加成功！');
            
            switchTab('all');
            renderAllQuestions();
            updateStats();
        }

        // ========== 统计更新 ==========
        function updateStats() {
            const total = wrongQuestions.length;
            const mastered = wrongQuestions.filter(q => q.mastered).length;
            const today = new Date().toISOString().split('T')[0];
            const todayReview = wrongQuestions.filter(q => 
                q.reviewDates && q.reviewDates[q.currentReviewIndex] === today && !q.mastered
            ).length;
            const reviewed = total - todayReview - mastered;

            document.getElementById('totalWrong').textContent = total;
            document.getElementById('todayReview').textContent = todayReview;
            document.getElementById('reviewedCount').textContent = reviewed;
            document.getElementById('masteredCount').textContent = mastered;

            // 更新进度
            const progress = total > 0 ? Math.round((mastered / total) * 100) : 0;
            document.getElementById('reviewProgress').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '%';

            // 更新艾宾浩斯计划
            updateEbbinghausSchedule();
        }

        function updateEbbinghausSchedule() {
            const today = new Date();
            
            const day1Count = wrongQuestions.filter(q => {
                const reviewDate = q.reviewDates[q.currentReviewIndex];
                const dateDiff = Math.ceil((new Date(reviewDate) - today) / (1000 * 60 * 60 * 24));
                return dateDiff === 0 && !q.mastered;
            }).length;

            const day3Count = wrongQuestions.filter(q => {
                const reviewDate = q.reviewDates[q.currentReviewIndex];
                const dateDiff = Math.ceil((new Date(reviewDate) - today) / (1000 * 60 * 60 * 24));
                return dateDiff === 3 && !q.mastered;
            }).length;

            const day7Count = wrongQuestions.filter(q => {
                const reviewDate = q.reviewDates[q.currentReviewIndex];
                const dateDiff = Math.ceil((new Date(reviewDate) - today) / (1000 * 60 * 60 * 24));
                return dateDiff === 7 && !q.mastered;
            }).length;

            const day14Count = wrongQuestions.filter(q => {
                const reviewDate = q.reviewDates[q.currentReviewIndex];
                const dateDiff = Math.ceil((new Date(reviewDate) - today) / (1000 * 60 * 60 * 24));
                return dateDiff === 14 && !q.mastered;
            }).length;

            document.getElementById('day1Count').textContent = day1Count + ' 题';
            document.getElementById('day3Count').textContent = day3Count + ' 题';
            document.getElementById('day7Count').textContent = day7Count + ' 题';
            document.getElementById('day14Count').textContent = day14Count + ' 题';
        }

        // ========== Tab 切换 ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('show');
            event.target.classList.add('active');

            if (tab === 'today') renderTodayQuestions();
            else if (tab === 'all') renderAllQuestions();
            else if (tab === 'mastered') renderMasteredQuestions();
        }
    </script>
</body>
</html>
