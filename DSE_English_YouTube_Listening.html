<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE英语自适应学习 - BBC听力系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .level-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .level-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .level-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .level-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .video-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none;
        }

        .video-section.show {
            display: block;
        }

        .video-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .video-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            padding: 10px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .youtube-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .questions-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .questions-header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .question-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }

        .options {
            display: grid;
            gap: 8px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .option:hover {
            background: #e8eeff;
            border-color: #667eea;
        }

        .option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .results-section {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .score-display {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .feedback {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
        }

        .vocabulary-section {
            background: #fff8e1;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .vocab-title {
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .vocab-item {
            background: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #f57c00;
        }

        .vocab-word {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .vocab-def {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .vocab-example {
            color: #999;
            font-style: italic;
            font-size: 0.9em;
        }

        .next-btn {
            background: #28a745;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }

        .next-btn:hover {
            background: #218838;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            .video-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎧 DSE英语自适应学习 - BBC听力系统</h1>
            <p>Learn English from real BBC YouTube videos</p>
        </div>

        <div class="content">
            <div class="level-selector" id="levelSelector"></div>
            <div class="video-section" id="videoSection">
                <div class="video-title" id="videoTitle"></div>
                <div class="video-info">
                    <div class="info-item">
                        <div class="info-label">📺 Channel</div>
                        <div id="channelInfo"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">⏱ Duration</div>
                        <div id="durationInfo"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📚 Topic</div>
                        <div id="topicInfo"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🎯 Level</div>
                        <div id="difficultyInfo"></div>
                    </div>
                </div>
                <div class="youtube-container">
                    <iframe id="youtubePlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

                <div class="questions-section">
                    <div class="questions-header">🧠 Comprehension Questions</div>
                    <form id="questionsForm">
                        <div id="questionsContainer"></div>
                        <button type="button" class="submit-btn" onclick="checkAnswers()">Submit Answers</button>
                    </form>

                    <div class="results-section" id="resultsSection">
                        <div class="score-display" id="scoreDisplay"></div>
                        <div id="feedbackContainer"></div>

                        <div class="vocabulary-section">
                            <div class="vocab-title">📚 Key Vocabulary</div>
                            <div id="vocabularyContainer"></div>
                        </div>

                        <button class="next-btn" onclick="nextLevel()">Next Level ➜</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoLibrary = {
            level1: [
                {
                    id: "001",
                    youtubeId: "7XVPQ8kcoOE",
                    title: "6 Minute English: Is the Internet Making us Unhappy?",
                    channel: "BBC Learning English",
                    duration: "6:35",
                    topic: "Technology & Mental Health",
                    difficulty: "Foundation",
                    questions: [
                        {
                            question: "What is the main topic?",
                            options: [
                                { text: "How to use internet safely", correct: false },
                                { text: "Internet use and happiness", correct: true },
                                { text: "Why social media is bad", correct: false },
                                { text: "Becoming a YouTuber", correct: false }
                            ]
                        },
                        {
                            question: "What can excessive internet use cause?",
                            options: [
                                { text: "Better sleep", correct: false },
                                { text: "Increased happiness", correct: false },
                                { text: "Mental health problems", correct: true },
                                { text: "Stronger family relationships", correct: false }
                            ]
                        },
                        {
                            question: "What does FOMO mean?",
                            options: [
                                { text: "A type of food", correct: false },
                                { text: "Fear of missing out", correct: true },
                                { text: "A new app", correct: false },
                                { text: "A social network", correct: false }
                            ]
                        },
                        {
                            question: "What does the presenter recommend?",
                            options: [
                                { text: "Stop using internet", correct: false },
                                { text: "Use internet more", correct: false },
                                { text: "Take breaks from internet", correct: true },
                                { text: "Only use at night", correct: false }
                            ]
                        },
                        {
                            question: "What is the tone of the video?",
                            options: [
                                { text: "Angry and critical", correct: false },
                                { text: "Informative and balanced", correct: true },
                                { text: "Promoting internet use", correct: false },
                                { text: "Humorous only", correct: false }
                            ]
                        }
                    ],
                    vocabulary: [
                        { word: "excessive", definition: "More than necessary", example: "He spent excessive time on his phone." },
                        { word: "FOMO", definition: "Fear of missing out", example: "FOMO made her check constantly." },
                        { word: "mental health", definition: "Psychological well-being", example: "Exercise helps mental health." },
                        { word: "recommendation", definition: "A suggestion", example: "I followed his recommendation." },
                        { word: "relationship", definition: "Connection between things", example: "Exercise improves health." }
                    ]
                }
            ],
            level2: [
                {
                    id: "002",
                    youtubeId: "xRsNLtMJzYE",
                    title: "6 Minute English: Learning Languages",
                    channel: "BBC Learning English",
                    duration: "6:15",
                    topic: "Language Learning",
                    difficulty: "Developing",
                    questions: [
                        { question: "What is the main focus?", options: [
                            { text: "Grammar only", correct: false },
                            { text: "Improving pronunciation", correct: true },
                            { text: "Writing skills", correct: false },
                            { text: "New vocabulary", correct: false }
                        ]},
                        { question: "What tip is about listening?", options: [
                            { text: "Listen to music only", correct: false },
                            { text: "Listen to podcasts and news", correct: true },
                            { text: "Don't listen", correct: false },
                            { text: "Listen to teacher", correct: false }
                        ]},
                        { question: "What is important for confidence?", options: [
                            { text: "Perfect grammar", correct: false },
                            { text: "Speaking regularly", correct: true },
                            { text: "More vocabulary", correct: false },
                            { text: "More videos", correct: false }
                        ]},
                        { question: "What about mistakes?", options: [
                            { text: "Avoid them", correct: false },
                            { text: "Part of learning", correct: true },
                            { text: "Look stupid", correct: false },
                            { text: "Not important", correct: false }
                        ]},
                        { question: "How many tips discussed?", options: [
                            { text: "Three", correct: false },
                            { text: "Four", correct: true },
                            { text: "Five", correct: false },
                            { text: "Two", correct: false }
                        ]}
                    ],
                    vocabulary: [
                        { word: "pronunciation", definition: "How words are spoken", example: "Her pronunciation improved greatly." },
                        { word: "fluency", definition: "Smooth speaking ability", example: "He speaks with great fluency." },
                        { word: "confidence", definition: "Belief in ability", example: "Speaking builds confidence." },
                        { word: "podcast", definition: "Audio/video series", example: "I listen to English podcasts." },
                        { word: "hesitation", definition: "Pausing before speaking", example: "She spoke without hesitation." }
                    ]
                }
            ],
            level3: [
                {
                    id: "003",
                    youtubeId: "4SE8qYCk5dE",
                    title: "BBC World: Living Well Philosophy",
                    channel: "BBC World Service",
                    duration: "8:45",
                    topic: "Life Philosophy",
                    difficulty: "Proficient",
                    questions: [
                        { question: "What philosophical concept is introduced?", options: [
                            { text: "Importance of wealth", correct: false },
                            { text: "Balancing pleasure and fulfillment", correct: true },
                            { text: "Nature of happiness", correct: false },
                            { text: "Avoiding challenges", correct: false }
                        ]},
                        { question: "How is well-being defined?", options: [
                            { text: "Only physical health", correct: false },
                            { text: "Multi-dimensional state", correct: true },
                            { text: "Having money", correct: false },
                            { text: "Avoiding problems", correct: false }
                        ]},
                        { question: "What example is used?", options: [
                            { text: "Business case", correct: false },
                            { text: "Personal anecdotes", correct: true },
                            { text: "Historical events", correct: false },
                            { text: "Scientific data only", correct: false }
                        ]},
                        { question: "What about challenges?", options: [
                            { text: "Always avoid", correct: false },
                            { text: "Opportunities for growth", correct: true },
                            { text: "Only negative", correct: false },
                            { text: "Irrelevant", correct: false }
                        ]},
                        { question: "What is the main conclusion?", options: [
                            { text: "Pursue only pleasure", correct: false },
                            { text: "Balance and meaning", correct: true },
                            { text: "Living well is impossible", correct: false },
                            { text: "Isolation is needed", correct: false }
                        ]}
                    ],
                    vocabulary: [
                        { word: "philosophical", definition: "Related to fundamental life questions", example: "He took a philosophical approach." },
                        { word: "well-being", definition: "State of health and happiness", example: "Mental well-being matters." },
                        { word: "multi-dimensional", definition: "Having many aspects", example: "Education is multi-dimensional." },
                        { word: "anecdote", definition: "Short personal story", example: "He shared an anecdote." },
                        { word: "fulfillment", definition: "Satisfaction of achievement", example: "She found fulfillment." }
                    ]
                }
            ],
            level4: [
                {
                    id: "004",
                    youtubeId: "PZH3IYvVWe8",
                    title: "BBC Hardtalk: The Future of AI",
                    channel: "BBC Hardtalk",
                    duration: "10:20",
                    topic: "Technology & Society",
                    difficulty: "Advanced",
                    questions: [
                        { question: "What is the primary concern about AI?", options: [
                            { text: "High cost", correct: false },
                            { text: "Impact on employment", correct: true },
                            { text: "Lack of advancement", correct: false },
                            { text: "Language understanding", correct: false }
                        ]},
                        { question: "What should government do?", options: [
                            { text: "Ban AI completely", correct: false },
                            { text: "Establish regulations", correct: true },
                            { text: "Allow unrestricted development", correct: false },
                            { text: "Leave to companies", correct: false }
                        ]},
                        { question: "How can job displacement be mitigated?", options: [
                            { text: "It cannot", correct: false },
                            { text: "Through education and retraining", correct: true },
                            { text: "It won't affect jobs", correct: false },
                            { text: "Policymakers shouldn't worry", correct: false }
                        ]},
                        { question: "How are innovation and ethics related?", options: [
                            { text: "Separate concerns", correct: false },
                            { text: "Ethics secondary", correct: false },
                            { text: "Must be balanced", correct: true },
                            { text: "Will emerge naturally", correct: false }
                        ]},
                        { question: "What about urgency of AI governance?", options: [
                            { text: "No urgency", correct: false },
                            { text: "Should be proactive", correct: true },
                            { text: "Wait and see", correct: false },
                            { text: "Only tech companies", correct: false }
                        ]}
                    ],
                    vocabulary: [
                        { word: "displacement", definition: "Forced removal from position", example: "Job displacement is concerning." },
                        { word: "regulation", definition: "Official rule or law", example: "New AI regulations exist." },
                        { word: "innovation", definition: "Introduction of new ideas", example: "Innovation transforms society." },
                        { word: "ethics", definition: "Principles of right and wrong", example: "Business ethics matter." },
                        { word: "governance", definition: "System of management", example: "Good governance is essential." }
                    ]
                }
            ],
            level5: [
                {
                    id: "005",
                    youtubeId: "8UlI1bqWZ_E",
                    title: "BBC Radio 4: Climate and Politics",
                    channel: "BBC Radio 4",
                    duration: "12:45",
                    topic: "Environment & Politics",
                    difficulty: "Mastery",
                    questions: [
                        { question: "What is the central paradox?", options: [
                            { text: "Climate change is unreal", correct: false },
                            { text: "Science understood, implementation complex", correct: true },
                            { text: "All countries agree", correct: false },
                            { text: "Technology solves everything", correct: false }
                        ]},
                        { question: "Economic interests and environment?", options: [
                            { text: "Inherently contradictory", correct: false },
                            { text: "Can be reconciled", correct: true },
                            { text: "Economic must prevail", correct: false },
                            { text: "No economic value", correct: false }
                        ]},
                        { question: "Role of international cooperation?", options: [
                            { text: "Unnecessary", correct: false },
                            { text: "Essential but inadequate", correct: true },
                            { text: "Individual nations can solve", correct: false },
                            { text: "Makes worse", correct: false }
                        ]},
                        { question: "What criticism of current policies?", options: [
                            { text: "Too aggressive", correct: false },
                            { text: "Insufficiently ambitious", correct: true },
                            { text: "Perfect", correct: false },
                            { text: "Irrelevant", correct: false }
                        ]},
                        { question: "Message about future generations?", options: [
                            { text: "Actions irrelevant", correct: false },
                            { text: "Inherit consequences", correct: true },
                            { text: "Will have better tech", correct: false },
                            { text: "Bear full responsibility", correct: false }
                        ]}
                    ],
                    vocabulary: [
                        { word: "paradox", definition: "Seemingly contradictory situation", example: "Freedom has paradoxes." },
                        { word: "reconcile", definition: "Make compatible", example: "Reconcile growth and sustainability." },
                        { word: "inherently", definition: "Permanently existing", example: "Problem is inherently political." },
                        { word: "ambient", definition: "Surrounding environment", example: "Ambient temperatures rising." },
                        { word: "constituency", definition: "Group of supporters", example: "Environmental constituency grows." }
                    ]
                }
            ]
        };

        let currentLevel = 1;
        let currentVideo = null;
        let userAnswers = {};

        function init() {
            renderLevelSelector();
            loadLevel(1);
        }

        function renderLevelSelector() {
            const selector = document.getElementById('levelSelector');
            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `level-btn ${i === 1 ? 'active' : ''}`;
                btn.textContent = `Level ${i}`;
                btn.onclick = () => loadLevel(i);
                selector.appendChild(btn);
            }
        }

        function loadLevel(level) {
            currentLevel = level;
            const videos = videoLibrary[`level${level}`];
            currentVideo = videos[0];
            displayVideo();

            document.querySelectorAll('.level-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === level);
            });

            userAnswers = {};
        }

        function displayVideo() {
            const section = document.getElementById('videoSection');
            section.classList.add('show');

            document.getElementById('videoTitle').textContent = currentVideo.title;
            document.getElementById('channelInfo').textContent = currentVideo.channel;
            document.getElementById('durationInfo').textContent = currentVideo.duration;
            document.getElementById('topicInfo').textContent = currentVideo.topic;
            document.getElementById('difficultyInfo').textContent = currentVideo.difficulty;

            document.getElementById('youtubePlayer').src = 
                `https://www.youtube.com/embed/${currentVideo.youtubeId}`;

            renderQuestions();
            document.getElementById('resultsSection').classList.remove('show');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            currentVideo.questions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.innerHTML = `
                    <div class="question-text">Q${idx + 1}: ${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => `
                            <label class="option">
                                <input type="radio" name="q${idx}" value="${optIdx}" 
                                    onchange="userAnswers[${idx}] = ${optIdx}">
                                <span>${opt.text}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function checkAnswers() {
            let correct = 0;
            const feedbackDiv = document.getElementById('feedbackContainer');
            feedbackDiv.innerHTML = '';

            currentVideo.questions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                if (userAnswer === undefined) {
                    const fb = document.createElement('div');
                    fb.className = 'feedback';
                    fb.innerHTML = `<strong>Q${idx + 1}:</strong> Please answer this question.`;
                    feedbackDiv.appendChild(fb);
                    return;
                }

                const isCorrect = q.options[userAnswer].correct;
                if (isCorrect) correct++;

                const fb = document.createElement('div');
                fb.className = 'feedback';
                fb.innerHTML = `
                    <strong>Q${idx + 1}: ${isCorrect ? '✅ Correct' : '❌ Incorrect'}</strong><br>
                    Your answer: ${q.options[userAnswer].text}<br>
                    ${!isCorrect ? `Correct answer: ${q.options.find(o => o.correct).text}` : ''}
                `;
                feedbackDiv.appendChild(fb);
            });

            const score = Math.round((correct / currentVideo.questions.length) * 100);
            document.getElementById('scoreDisplay').textContent = `Score: ${score}% (${correct}/${currentVideo.questions.length})`;

            const vocabDiv = document.getElementById('vocabularyContainer');
            vocabDiv.innerHTML = currentVideo.vocabulary.map(v => `
                <div class="vocab-item">
                    <div class="vocab-word">${v.word}</div>
                    <div class="vocab-def"><strong>Definition:</strong> ${v.definition}</div>
                    <div class="vocab-example"><strong>Example:</strong> ${v.example}</div>
                </div>
            `).join('');

            document.getElementById('resultsSection').classList.add('show');
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function nextLevel() {
            if (currentLevel < 5) {
                loadLevel(currentLevel + 1);
            } else {
                alert('🎉 Congratulations! You have completed all levels!');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
