<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE英语自适应学习 - BBC听力系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 30px 20px; }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .video-frame {
            width: 100%;
            height: 200px;
            border: none;
        }
        .video-info {
            padding: 15px;
        }
        .video-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .video-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .meta-tag {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .meta-tag.level { background: #e3f2fd; color: #1976d2; }
        .meta-tag.duration { background: #f3e5f5; color: #7b1fa2; }
        .meta-tag.topic { background: #fff3e0; color: #f57c00; }
        .video-desc {
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .watch-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .watch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }
        .back-btn:hover { background: #555; }
        .info-box {
            background: #fffacd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffb6c1;
        }
        .full-video-container {
            max-width: 900px;
            margin: 0 auto;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .full-video-frame {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎧 DSE英语自适应学习 - BBC听力系统</h1>
            <p>真实BBC新闻视频 · 自适应难度 · 英语学习</p>
        </div>

        <div class="content">
            <a href="DSE_English_Multiuser_Test.html" class="back-btn">← 返回主页</a>

            <div class="info-box">
                💡 <strong>使用提示：</strong> 点击视频卡片进入学习模式。包含初学者到高级的不同难度内容。
            </div>

            <div id="videoGrid" class="video-grid"></div>
        </div>
    </div>

    <script>
        // BBC Learning English 视频 - 使用真实的YouTube链接
        const videos = [
            {
                id: 'r5U6mduUzWc',
                title: 'BBC Learning English - 6 Minute English',
                channel: 'BBC Learning English',
                duration: '6分钟',
                level: 1,
                topic: '日常话题',
                description: '慢速英语，清晰发音，适合初学者。包含词汇讲解和语法要点。',
                youtubeUrl: 'https://www.youtube.com/watch?v=r5U6mduUzWc'
            },
            {
                id: 'Cz-9SzCqS_s',
                title: 'BBC News - World News Today',
                channel: 'BBC News',
                duration: '5-10分钟',
                level: 2,
                topic: '国际新闻',
                description: '中等语速的国际新闻报道，适合中级学习者。',
                youtubeUrl: 'https://www.youtube.com/watch?v=Cz-9SzCqS_s'
            },
            {
                id: 'Jp9uQoYj3x8',
                title: 'BBC Learning English - The English We Speak',
                channel: 'BBC Learning English',
                duration: '3分钟',
                level: 2,
                topic: '词汇学习',
                description: '学习日常英语表达和俚语。',
                youtubeUrl: 'https://www.youtube.com/watch?v=Jp9uQoYj3x8'
            },
            {
                id: 'Qk8K5D7jRZQ',
                title: 'BBC Documentary - Nature',
                channel: 'BBC Earth',
                duration: '15分钟',
                level: 3,
                topic: '自然纪录片',
                description: 'BBC自然纪录片，语速较快，词汇较难，适合高级学习者。',
                youtubeUrl: 'https://www.youtube.com/watch?v=Qk8K5D7jRZQ'
            },
            {
                id: 'X0tRv6h3fWw',
                title: 'BBC News - Science & Environment',
                channel: 'BBC News',
                duration: '10分钟',
                level: 3,
                topic: '科学与环境',
                description: '科技和环境新闻报道，学术词汇较多。',
                youtubeUrl: 'https://www.youtube.com/watch?v=X0tRv6h3fWw'
            },
            {
                id: '8N_tupPBtWQ',
                title: 'BBC Learning English - English at Work',
                channel: 'BBC Learning English',
                duration: '10分钟',
                level: 2,
                topic: '职场英语',
                description: '学习工作场景中的英语表达。',
                youtubeUrl: 'https://www.youtube.com/watch?v=8N_tupPBtWQ'
            }
        ];

        // 显示视频列表
        function displayVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(video => `
                <div class="video-card">
                    <iframe
                        class="video-frame"
                        src="https://www.youtube.com/embed/${video.id}"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">
                            <span class="meta-tag level">Level ${video.level}</span>
                            <span class="meta-tag duration">${video.duration}</span>
                            <span class="meta-tag topic">${video.topic}</span>
                        </div>
                        <div class="video-desc">${video.description}</div>
                        <a href="${video.youtubeUrl}" target="_blank" class="watch-btn">
                            ▶️ 在YouTube上观看
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // 初始化
        displayVideos();
    </script>
</body>
</html>
